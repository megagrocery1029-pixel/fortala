<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memento Vivere</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Times New Roman", serif;
      overflow: hidden;
      background: #dff7d9;
    }

    .screen {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.8s ease;
    }

    .main-scene {
      text-align: center;
      position: relative;
      z-index: 2;
      padding: 20px;
    }

    .worm-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .banner {
      background: #8fd3ff;
      color: #234;
      padding: 18px 24px;
      border-radius: 22px;
      width: min(900px, 90vw);
      border: 3px solid #ffffff;
      box-shadow: 0 8px 0 rgba(255,255,255,0.7), 0 14px 30px rgba(0,0,0,0.08);
      font-size: clamp(18px, 2vw, 28px);
      line-height: 1.35;
    }

    .choices {
      position: relative;
      width: min(420px, 80vw);
      height: 150px;
      margin: 28px auto 0;
    }

    .bubble {
      position: absolute;
      width: 110px;
      height: 70px;
      border-radius: 999px;
      border: 3px solid #d7ecd2;
      background: white;
      color: #3f6b45;
      font-family: "Times New Roman", serif;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, left 0.25s ease, top 0.25s ease, background 0.25s ease;
      user-select: none;
    }

    .bubble:hover {
      transform: scale(1.06);
    }

    #yesBtn {
      left: 40px;
      top: 40px;
    }

    #noBtn {
      right: 40px;
      top: 40px;
    }

    .celebration {
      position: absolute;
      inset: 0;
      display: none;
      background: white;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 5;
      overflow: hidden;
    }

    .celebration.show {
      display: flex;
    }

    .message {
      font-family: "Times New Roman", serif;
      color: #4f8b57;
      font-size: clamp(34px, 5vw, 64px);
      text-align: center;
      padding: 20px;
      z-index: 8;
      text-shadow: 2px 2px 0 #e6f9e2;
    }

    .sub {
      margin-top: 10px;
      font-size: clamp(18px, 2vw, 28px);
      color: #86a98a;
      z-index: 8;
    }

    .firework-area {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 6;
    }

    .worm-burst {
      position: absolute;
      width: 30px;
      height: 30px;
      transform: translate(-50%, -50%);
      animation: popFly 1.6s ease-out forwards;
    }

    @keyframes popFly {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.4) rotate(0deg);
      }
      80% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform:
          translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
          scale(1.2)
          rotate(var(--r));
      }
    }

    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #b8f0aa;
      animation: sparkle 1.2s ease-out forwards;
      opacity: 0.9;
    }

    @keyframes sparkle {
      from {
        transform: scale(0.3);
        opacity: 1;
      }
      to {
        transform: translate(var(--sx), var(--sy)) scale(1.8);
        opacity: 0;
      }
    }

    .corner-hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.25;
    }

    .heart {
      position: absolute;
      color: white;
      font-size: 26px;
      animation: floaty 4s ease-in-out infinite;
    }

    @keyframes floaty {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    svg {
      overflow: visible;
    }
  </style>
</head>
<body>
  <div class="screen" id="screen">
    <div class="corner-hearts">
      <div class="heart" style="left:8%; top:18%;">♡</div>
      <div class="heart" style="left:18%; top:72%; animation-delay:0.8s;">♡</div>
      <div class="heart" style="left:80%; top:15%; animation-delay:1.2s;">♡</div>
      <div class="heart" style="left:88%; top:75%; animation-delay:0.4s;">♡</div>
      <div class="heart" style="left:48%; top:10%; animation-delay:1.6s;">♡</div>
    </div>

    <div class="main-scene" id="mainScene">
      <div class="worm-wrap">
        <!-- Cute green worm with graduation hat -->
        <svg width="280" height="220" viewBox="0 0 280 220" aria-label="Cute worm">
          <!-- banner strings -->
          <line x1="80" y1="115" x2="65" y2="150" stroke="#6c9" stroke-width="4"/>
          <line x1="200" y1="115" x2="215" y2="150" stroke="#6c9" stroke-width="4"/>

          <!-- worm body -->
          <ellipse cx="140" cy="115" rx="58" ry="42" fill="#8fe28b" stroke="#4f9c58" stroke-width="4"/>
          <ellipse cx="97" cy="132" rx="23" ry="18" fill="#8fe28b" stroke="#4f9c58" stroke-width="4"/>
          <ellipse cx="182" cy="132" rx="23" ry="18" fill="#8fe28b" stroke="#4f9c58" stroke-width="4"/>

          <!-- blush -->
          <ellipse cx="112" cy="123" rx="9" ry="5" fill="#ffc3cf"/>
          <ellipse cx="168" cy="123" rx="9" ry="5" fill="#ffc3cf"/>

          <!-- eyes -->
          <circle cx="123" cy="110" r="9" fill="white"/>
          <circle cx="157" cy="110" r="9" fill="white"/>
          <circle cx="124" cy="112" r="4" fill="#1a2a1a"/>
          <circle cx="158" cy="112" r="4" fill="#1a2a1a"/>
          <circle cx="126" cy="109" r="1.8" fill="white"/>
          <circle cx="160" cy="109" r="1.8" fill="white"/>

          <!-- smile -->
          <path d="M126 133 Q140 146 154 133" stroke="#2e5e34" stroke-width="4" fill="none" stroke-linecap="round"/>

          <!-- tiny arms -->
          <path d="M88 128 Q63 120 52 130" stroke="#4f9c58" stroke-width="4" fill="none" stroke-linecap="round"/>
          <path d="M192 128 Q217 120 228 130" stroke="#4f9c58" stroke-width="4" fill="none" stroke-linecap="round"/>

          <!-- grad hat -->
          <polygon points="105,73 140,58 175,73 140,88" fill="#1f2d1f"/>
          <rect x="126" y="72" width="28" height="10" rx="3" fill="#2f3a2f"/>
          <line x1="168" y1="74" x2="183" y2="98" stroke="#d8b44a" stroke-width="3"/>
          <circle cx="184" cy="100" r="4" fill="#d8b44a"/>
        </svg>

        <div class="banner">
          Do you believe you have what it takes to excel in law school, become a skilled lawyer, and make a real difference for people affected by a flawed system?
        </div>

        <div class="choices" id="choiceArea">
          <button class="bubble" id="yesBtn">yes</button>
          <button class="bubble" id="noBtn">no</button>
        </div>
      </div>
    </div>

    <div class="celebration" id="celebration">
      <div class="firework-area" id="fireworkArea"></div>
      <div class="message">Just a reminder: memento vivere</div>
      <div class="sub">♡ keep going ♡</div>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const choiceArea = document.getElementById("choiceArea");
    const celebration = document.getElementById("celebration");
    const fireworkArea = document.getElementById("fireworkArea");
    const mainScene = document.getElementById("mainScene");

    let noClickedOnce = false;
    let areaWidth, areaHeight, btnWidth, btnHeight;

    function updateSizes() {
      areaWidth = choiceArea.clientWidth;
      areaHeight = choiceArea.clientHeight;
      btnWidth = noBtn.offsetWidth;
      btnHeight = noBtn.offsetHeight;
    }

    updateSizes();
    window.addEventListener("resize", updateSizes);

    function moveNoButton() {
      updateSizes();
      const padding = 5;
      const maxX = areaWidth - btnWidth - padding;
      const maxY = areaHeight - btnHeight - padding;

      const x = Math.random() * (maxX - padding) + padding;
      const y = Math.random() * (maxY - padding) + padding;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
      noBtn.style.right = "auto";
    }

    noBtn.addEventListener("mouseenter", moveNoButton);

    noBtn.addEventListener("click", function () {
      if (!noClickedOnce) {
        noBtn.textContent = "yes";
        noClickedOnce = true;
      } else {
        launchCelebration();
      }
    });

    yesBtn.addEventListener("click", launchCelebration);

    function launchCelebration() {
      mainScene.style.display = "none";
      celebration.classList.add("show");
      startFireworks();
    }

    function wormSVG() {
      return `
        <svg viewBox="0 0 60 60" width="30" height="30">
          <ellipse cx="30" cy="30" rx="18" ry="14" fill="#8fe28b" stroke="#4f9c58" stroke-width="3"/>
          <circle cx="24" cy="26" r="3.5" fill="white"/>
          <circle cx="36" cy="26" r="3.5" fill="white"/>
          <circle cx="24.5" cy="27" r="1.6" fill="#1a2a1a"/>
          <circle cx="36.5" cy="27" r="1.6" fill="#1a2a1a"/>
          <path d="M24 35 Q30 40 36 35" stroke="#2e5e34" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <polygon points="18,14 30,9 42,14 30,19" fill="#1f2d1f"/>
          <rect x="25" y="14" width="10" height="4" rx="1.5" fill="#2f3a2f"/>
        </svg>
      `;
    }

    function burst(x, y) {
      for (let i = 0; i < 12; i++) {
        const worm = document.createElement("div");
        worm.className = "worm-burst";
        worm.style.left = x + "px";
        worm.style.top = y + "px";

        const angle = Math.random() * Math.PI * 2;
        const dist = 80 + Math.random() * 120;
        const dx = Math.cos(angle) * dist + "px";
        const dy = Math.sin(angle) * dist + "px";
        const rot = (Math.random() * 720 - 360) + "deg";

        worm.style.setProperty("--x", dx);
        worm.style.setProperty("--y", dy);
        worm.style.setProperty("--r", rot);
        worm.innerHTML = wormSVG();
        fireworkArea.appendChild(worm);

        setTimeout(() => worm.remove(), 1600);
      }

      for (let i = 0; i < 18; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = x + "px";
        s.style.top = y + "px";
        s.style.setProperty("--sx", (Math.random() * 180 - 90) + "px");
        s.style.setProperty("--sy", (Math.random() * 180 - 90) + "px");
        fireworkArea.appendChild(s);

        setTimeout(() => s.remove(), 1200);
      }
    }

    function startFireworks() {
      const bursts = [
        [window.innerWidth * 0.2, window.innerHeight * 0.28],
        [window.innerWidth * 0.5, window.innerHeight * 0.2],
        [window.innerWidth * 0.8, window.innerHeight * 0.3],
        [window.innerWidth * 0.28, window.innerHeight * 0.65],
        [window.innerWidth * 0.72, window.innerHeight * 0.68]
      ];

      let count = 0;
      const interval = setInterval(() => {
        const [x, y] = bursts[count % bursts.length];
        burst(x, y);
        count++;

        if (count > 18) {
          clearInterval(interval);
        }
      }, 500);
    }
  </script>
</body>
</html>
